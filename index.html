<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AQe Digital — Intelligent Digital Solutions</title>
  <meta name="description" content="AQe Digital delivers intelligent digital solutions — from AI-powered platforms to enterprise infrastructure." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #09090f;
      --accent:  #4f8aff;
      --accent2: #00e5c0;
      --text:    #e8eaf0;
      --muted:   #6b7280;
      --border:  rgba(255,255,255,0.07);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
    }

    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,138,255,0.13) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50%       { transform: translate(-50%, -50%) scale(1.2); }
    }

    .hero {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(79,138,255,0.22);
      background: rgba(79,138,255,0.06);
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 32px;
      animation: fadeUp 0.7s ease both;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent2);
      animation: blink 2.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(40px, 7.5vw, 90px);
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.03em;
      color: var(--text);
      animation: fadeUp 0.7s 0.1s ease both;
    }

    h1 .grad {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-size: clamp(15px, 1.6vw, 18px);
      font-weight: 300;
      color: var(--muted);
      max-width: 460px;
      margin-top: 24px;
      line-height: 1.75;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .url {
      margin-top: 40px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      animation: fadeUp 0.7s 0.3s ease both;
    }

    .url a {
      color: var(--accent);
      text-decoration: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <section class="hero">
    <span class="eyebrow">
      <span class="dot"></span>
      Intelligent Digital Solutions
    </span>

    <h1>We Build<br/><span class="grad">Digital Products</span></h1>

    <p class="sub">
      Enterprise software, AI-powered platforms, and cloud infrastructure — engineered to scale, built to last.
    </p>

    <p class="url"><a href="https://aqedigital.com">aqedigital.com</a></p>
  </section>
</body>
</html>
